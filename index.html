</style>

function drawLandCanvas(rings, topoImg){

  for(let i=0;i<16000;i++){const a=Math.random();ctx.fillStyle=a<0.5?('rgba(160,190,230,'+(Math.random()*0.045)+')'):('rgba(0,0,0,'+(Math.random()*0.05)+')');ctx.fillRect(Math.random()*TW,Math.random()*TH,2,2);}

  for(let lat=-75;lat<=75;lat+=15){ctx.beginPath();const y=(90-lat)/180*TH;ctx.moveTo(0,y);ctx.lineTo(TW,y);ctx.stroke();}
  const tint=document.createElement('canvas');tint.width=TW;tint.height=TH;const tctx=tint.getContext('2d');
  if(topoImg){const tmp=document.createElement('canvas');tmp.width=TW;tmp.height=TH;const mctx=tmp.getContext('2d');mctx.drawImage(topoImg,0,0,TW,TH);const src=mctx.getImageData(0,0,TW,TH);const dst=tctx.createImageData(TW,TH);const sd=src.data,dd=dst.data;for(let i=0;i<sd.length;i+=4){const h=sd[i]/255;const c=hypsoColor(h);dd[i]=c[0];dd[i+1]=c[1];dd[i+2]=c[2];dd[i+3]=255;}tctx.putImageData(dst,0,0);}else{tctx.fillStyle='#6a5a40';tctx.fillRect(0,0,TW,TH);}
  const clip=document.createElement('canvas');clip.width=TW;clip.height=TH;const cctx=clip.getContext('2d');cctx.drawImage(tint,0,0);cctx.globalCompositeOperation='destination-in';landPath(cctx);cctx.fill('nonzero');ctx.drawImage(clip,0,0);

  ctx.strokeStyle=T.coast;ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.lineCap='round';[-360,0,360].forEach(strokePath);

  for(let i=0;i<8000;i++){ctx.fillStyle='rgba(0,0,0,'+(Math.random()*0.035)+')';ctx.fillRect(Math.random()*TW,Math.random()*TH,1.6,1.6);}
  for(let i=0;i<2500;i++){ctx.fillStyle='rgba(255,245,230,'+(Math.random()*0.018)+')';ctx.fillRect(Math.random()*TW,Math.random()*TH,3,3);}
  return cv;
}

function uvWrap(geo){const pos=geo.attributes.position;const uv=[];let minY=1e9,maxY=-1e9;for(let i=0;i<pos.count;i++){const y=pos.getY(i);if(y<minY)minY=y;if(y>maxY)maxY=y;}for(let i=0;i<pos.count;i++){const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);uv.push((Math.atan2(z,x)/(Math.PI*2))+0.5,(y-minY)/(maxY-minY||1));}geo.setAttribute('uv',new THREE.Float32BufferAttribute(uv,2));geo.computeVertexNormals();return geo;}
function roughen(geo,amt){const p=geo.attributes.position;const seen={};for(let i=0;i<p.count;i++){const k=p.getX(i).toFixed(4)+','+p.getY(i).toFixed(4)+','+p.getZ(i).toFixed(4);let d=seen[k];if(!d){d=[(Math.random()-0.5)*amt,(Math.random()-0.5)*amt,(Math.random()-0.5)*amt];seen[k]=d;}p.setXYZ(i,p.getX(i)+d[0],p.getY(i)+d[1],p.getZ(i)+d[2]);}p.needsUpdate=true;return geo;}
function corundumHabit(U){const g=new THREE.CylinderGeometry(U*0.92,U*0.82,U*1.7,6,2);roughen(g,U*0.12);return uvWrap(g);}

function deriveMaps(img, baseHex){
  const SZ=256;function base(){const cv=document.createElement('canvas');cv.width=SZ;cv.height=SZ;return cv;}
  const mapCv=base();const mctx=mapCv.getContext('2d');const s=Math.max(SZ/img.width,SZ/img.height);const dw=img.width*s,dh=img.height*s;mctx.drawImage(img,(SZ-dw)/2,(SZ-dh)/2,dw,dh);
  const id=mctx.getImageData(0,0,SZ,SZ);const d=id.data;const br=(baseHex>>16)&255,bg=(baseHex>>8)&255,bb=baseHex&255;
  const bump=base(),rough=base();const bd=bump.getContext('2d').createImageData(SZ,SZ),rd=rough.getContext('2d').createImageData(SZ,SZ);
  for(let i=0;i<d.length;i+=4){let r=d[i],g=d[i+1],b=d[i+2];const mx=Math.max(r,g,b),mn=Math.min(r,g,b);const lum=(r*0.299+g*0.587+b*0.114)/255;const sat=mx===0?0:(mx-mn)/mx;
    if(lum>0.62&&sat<0.22){const k=0.45+lum*0.5;r=Math.min(255,br*k);g=Math.min(255,bg*k);b=Math.min(255,bb*k);}else{r=r*0.7+br*0.3;g=g*0.7+bg*0.3;b=b*0.7+bb*0.3;}
    r*=0.85;g*=0.85;b*=0.85;d[i]=r;d[i+1]=g;d[i+2]=b;const L=(r*0.299+g*0.587+b*0.114);bd.data[i]=bd.data[i+1]=bd.data[i+2]=L;bd.data[i+3]=255;const rr=Math.max(0,255-L*0.9);rd.data[i]=rd.data[i+1]=rd.data[i+2]=rr;rd.data[i+3]=255;}
  mctx.putImageData(id,0,0);bump.getContext('2d').putImageData(bd,0,0);rough.getContext('2d').putImageData(rd,0,0);
  const mk=function(cv){const t=new THREE.CanvasTexture(cv);t.anisotropy=8;t.needsUpdate=true;return t;};const mapTex=mk(mapCv);mapTex.encoding=THREE.sRGBEncoding;return {map:mapTex,bump:mk(bump),rough:mk(rough)};
}
function getGemMaterial(g){if(matCache[g.img]) return matCache[g.img];const img=imgCache[g.img];let mat;const glossy=(g.family==='corundum'||g.habit==='beryl'||g.habit==='quartz'||g.habit==='prismatic'||g.habit==='octa');const pearl=(g.habit==='sphere');if(img){const m=deriveMaps(img,g.color);mat=new THREE.MeshPhysicalMaterial({map:m.map,bumpMap:m.bump,bumpScale:pearl?0.01:(glossy?0.05:0.09),roughnessMap:pearl?null:m.rough,roughness:pearl?0.25:(glossy?0.32:0.55),metalness:0.0,clearcoat:pearl?1.0:(glossy?0.85:0.35),clearcoatRoughness:pearl?0.25:(glossy?0.12:0.4),envMap:envMap,envMapIntensity:glossy?1.2:0.7,reflectivity:glossy?0.8:0.4});}else{mat=new THREE.MeshPhysicalMaterial({color:g.color,roughness:0.3,clearcoat:0.8,envMap:envMap,envMapIntensity:1.0});}matCache[g.img]=mat;return mat;}

function makeGem(g){
  const group=new THREE.Group();
  const up=ll2v3(g.lat,g.lon,1).normalize();const baseQuat=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),up);
  const Ubase=0.026;const mat=getGemMaterial(g);
  const single=(g.habit==='octa'||g.habit==='sphere');
  const n=single?1:(3+Math.floor(Math.random()*3));
  for(let k=0;k<n;k++){const isMain=(k===0);const U=Ubase*(single?1.05:(isMain?(0.95+Math.random()*0.25):(0.4+Math.random()*0.45)));const geo=makeHabitGeo(g,U);const m=new THREE.Mesh(geo,mat);const dLat=single?0:(Math.random()-0.5)*(isMain?0.5:2.0);const dLon=single?0:(Math.random()-0.5)*(isMain?0.5:2.0);const lift=1.045+U*0.42;m.position.copy(ll2v3(g.lat+dLat,g.lon+dLon,lift));const localUp=m.position.clone().normalize();m.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),localUp));m.rotateY(Math.random()*Math.PI*2);if(!single){const tilt=(g.habit==='nodule'||g.habit==='pebble')?0.9:0.5;m.rotateX((Math.random()-0.5)*tilt);m.rotateZ((Math.random()-0.5)*tilt);}m.userData={gem:g};group.add(m);pickMeshes.push(m);}
  const ring=new THREE.Mesh(new THREE.RingGeometry(Ubase*1.5,Ubase*2.05,32),new THREE.MeshBasicMaterial({color:g.color,transparent:true,opacity:0.28,side:THREE.DoubleSide,depthWrite:false}));

  group.userData={gem:g,ring};return group;
}

  const topoP=new Promise(function(res){const img=new Image();img.crossOrigin='anonymous';img.onload=function(){res(img);};img.onerror=function(){res(null);};img.src='https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-topology.png';});
  const dataP=fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.json(); });
  const imgNames=[...new Set(GEMS.map(function(g){return g.img;}))];
  const gemImgP=Promise.all(imgNames.map(function(n){return new Promise(function(res){const im=new Image();im.crossOrigin='anonymous';im.onload=function(){imgCache[n]=im;res();};im.onerror=function(){imgCache[n]=null;res();};im.src=BASE+n+'.jpg';});}));

function fallbackEnv(){const s=new THREE.Scene();s.background=new THREE.Color(0x445060);[[0xaac4dd,8,10,5],[0xffffff,-10,8,-4],[0xe8d8b0,5,-8,8],[0xffffff,0,12,-6]].forEach(function(a){const p=new THREE.Mesh(new THREE.PlaneGeometry(16,16),new THREE.MeshBasicMaterial({color:a[0]}));p.position.set(a[1],a[2],a[3]);p.lookAt(0,0,0);s.add(p);});return s;}

function addMarkers(){gemObjs.forEach(function(g){earthGroup.remove(g);});gemObjs=[];pickMeshes=[];GEMS.forEach(function(g){if(!markerPass(g)) return;const obj=makeGem(g);earthGroup.add(obj);gemObjs.push(obj);});}
function markerPass(g){if(currentFilter!=='all'&&g.sp!==currentFilter) return false;if(searchQ){const q=searchQ.toLowerCase();if(!(g.name.toLowerCase().indexOf(q)>=0||g.loc.toLowerCase().indexOf(q)>=0)) return false;}return true;}

// 动态生成筛选 chip：全部 + 每种宝石品种（带颜色点），一眼看到所有种类
function buildChips(){
  const box=document.getElementById('chips');box.innerHTML='';
  function mk(f,label,color){
    const b=document.createElement('button');b.className='chip'+(f===currentFilter?' active':'');b.dataset.f=f;
    b.innerHTML=(color!=null?'<span class="dot" style="background:#'+color.toString(16).padStart(6,'0')+'"></span>':'')+label;
    b.addEventListener('click',function(){currentFilter=f;document.querySelectorAll('#chips .chip').forEach(function(c){c.classList.toggle('active',c.dataset.f===f);});addMarkers();buildList();});
    box.appendChild(b);
  }
  mk('all','全部',null);
  Object.keys(SPECIES).forEach(function(sp){ mk(sp,SPECIES[sp].name,SPECIES[sp].color); });
}
function buildList(){
  listEl.innerHTML='';
  let list=GEMS.filter(markerPass);
  const dedupe=(currentFilter==='all' && !searchQ);
  if(dedupe){
    const seen={};const reps=[];
    list.forEach(function(g){ if(!seen[g.sp]){seen[g.sp]=1;reps.push(g);} });
    list=reps;
    countEl.innerHTML='<span><b>'+reps.length+'</b> 种宝石</span><span>共 <b>'+GEMS.length+'</b> 处产区</span>';
  } else {
    const spCount=new Set(list.map(function(g){return g.sp;})).size;
    countEl.innerHTML='<span><b>'+list.length+'</b> 处产区</span><span><b>'+spCount+'</b> 种宝石</span>';
  }
  list.forEach(function(g){
    const card=document.createElement('div');card.className='gem-card';card.dataset.id=g._id;
    const spName=SPECIES[g.sp].name;
    if(dedupe){
      const cnt=SP_COUNT[g.sp];
      card.innerHTML='<img src="'+BASE+g.img+'.jpg" alt=""/><div class="info"><div class="nm">'+spName+'</div><div class="lc">'+familyName(SPECIES[g.sp].family)+'</div></div><div class="cnt">'+cnt+' 处</div>';
    } else {
      card.innerHTML='<img src="'+BASE+g.img+'.jpg" alt=""/><div class="info"><div class="nm">'+g.name+'</div><div class="lc">'+g.loc+'</div></div><div class="swatch" style="background:#'+g.color.toString(16).padStart(6,'0')+'"></div>';
    }
    card.addEventListener('click',function(){focusGem(g);showDetail(g);highlightCard(g._id);});
    card.addEventListener('mouseenter',function(){hovered=gemObjs.find(function(o){return o.userData.gem===g;})||null;});
    card.addEventListener('mouseleave',function(){hovered=null;});
    listEl.appendChild(card);
  });
}

let hovered=null;
function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();
  if(spinToTarget){earthGroup.rotation.y+=(spinToTarget.y-earthGroup.rotation.y)*0.08;earthGroup.rotation.x+=(spinToTarget.x-earthGroup.rotation.x)*0.08;if(Math.abs(spinToTarget.y-earthGroup.rotation.y)<0.01){earthGroup.rotation.y=spinToTarget.y;spinToTarget=null;}}
  else if(!isDragging&&autoRotate) earthGroup.rotation.y+=0.0012;
  camera.position.z+=(camZTarget-camera.position.z)*0.06;
  gemObjs.forEach(function(obj,i){if(obj.userData.ring) obj.userData.ring.material.opacity=(obj===hovered?0.42:0.18)+0.06*Math.abs(Math.sin(t*1.0+i*0.7));const target=(obj===hovered)?1.07:1.0;obj.scale.lerp(new THREE.Vector3(target,target,target),0.05);});
  renderer.render(scene,camera);}
const raycaster=new THREE.Raycaster();const mouse2d=new THREE.Vector2();
function getNDC(e){const r=canvas.getBoundingClientRect();return {x:((e.clientX-r.left)/r.width)*2-1,y:-((e.clientY-r.top)/r.height)*2+1};}
function hits(e){const nd=getNDC(e);mouse2d.set(nd.x,nd.y);raycaster.setFromCamera(mouse2d,camera);return raycaster.intersectObjects(pickMeshes);}
function setupEvents(){
  canvas.addEventListener('mousedown',function(e){isDragging=true;autoRotate=false;spinToTarget=null;prevMouse={x:e.clientX,y:e.clientY};});window.addEventListener('mouseup',function(){isDragging=false;});
  canvas.addEventListener('mousemove',function(e){if(isDragging){earthGroup.rotation.y+=(e.clientX-prevMouse.x)*.006;earthGroup.rotation.x+=(e.clientY-prevMouse.y)*.006;earthGroup.rotation.x=Math.max(-1.2,Math.min(1.2,earthGroup.rotation.x));prevMouse={x:e.clientX,y:e.clientY};return;}const h=hits(e);if(h.length){const g=h[0].object.userData.gem;hovered=gemObjs.find(function(o){return o.userData.gem===g;})||null;tooltip.style.display='block';tooltip.textContent=g.name+' · '+g.loc;const r=wrap.getBoundingClientRect();tooltip.style.left=(e.clientX-r.left+12)+'px';tooltip.style.top=(e.clientY-r.top-8)+'px';canvas.style.cursor='pointer';highlightCard(g._id);}else{hovered=null;tooltip.style.display='none';canvas.style.cursor='grab';}});
  canvas.addEventListener('click',function(e){const h=hits(e);if(h.length){const g=h[0].object.userData.gem;focusGem(g);showDetail(g);highlightCard(g._id);}});
  // 触摸支持（移动端）
  canvas.addEventListener('touchstart',function(e){if(e.touches.length===1){isDragging=true;autoRotate=false;spinToTarget=null;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};}},{passive:true});
  canvas.addEventListener('touchmove',function(e){if(isDragging&&e.touches.length===1){earthGroup.rotation.y+=(e.touches[0].clientX-prevMouse.x)*.006;earthGroup.rotation.x+=(e.touches[0].clientY-prevMouse.y)*.006;earthGroup.rotation.x=Math.max(-1.2,Math.min(1.2,earthGroup.rotation.x));prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};}},{passive:true});
  canvas.addEventListener('touchend',function(){isDragging=false;});
  document.getElementById('close-btn').addEventListener('click',closeModal);
  overlay.addEventListener('click',function(e){if(e.target===overlay) closeModal();});
  buildChips();
  document.getElementById('search').addEventListener('input',function(e){searchQ=e.target.value;addMarkers();buildList();});
  window.addEventListener('resize',function(){const W=wrap.clientWidth,H=wrap.clientHeight;camera.aspect=W/H;camera.updateProjectionMatrix();renderer.setSize(W,H);drawStars();});
}
function closeModal(){overlay.style.display='none';autoRotate=true;highlightCard(-1);camZTarget=CAM_FAR;}
function showDetail(g){
  overlay.style.display='flex';document.getElementById('dp-scroll').scrollTop=0;
  const ph=document.getElementById('dp-photo');ph.src=BASE+g.img+'.jpg';ph.alt=g.name;
  document.getElementById('dp-name').textContent=g.name;document.getElementById('dp-loc').textContent=g.loc;
  const bd=document.getElementById('dp-badges');bd.innerHTML=(g.badges||[]).map(function(b){return '<span class="badge">'+b+'</span>';}).join('');
  const noteEl=document.getElementById('dp-note');
  if(g.note){noteEl.style.display='block';noteEl.textContent='📍 '+g.note;}else{noteEl.style.display='none';}
  document.getElementById('dp-desc').textContent=g.desc;
  document.getElementById('dp-family').textContent=familyName(g.family);
  document.getElementById('dp-formula').textContent=g.formula;document.getElementById('dp-hardness').textContent=g.hardness;
  document.getElementById('dp-sys').textContent=g.sys;document.getElementById('dp-ri').textContent=g.ri;
  document.getElementById('dp-cause').textContent=g.cause;document.getElementById('dp-sources').textContent=g.sources;
  document.getElementById('dp-lore').textContent=g.lore;
}
init();
})();
</script>
</body>
</html>
